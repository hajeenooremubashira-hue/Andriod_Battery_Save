!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Battery Saver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #28a745;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Android Battery Saver</h1>

    <!-- Form for Battery Optimization -->
    <form method="POST" action="/optimize">
        <label for="brightness">Screen Brightness</label>
        <select name="brightness" id="brightness">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <label for="timeout">Screen Timeout (minutes)</label>
        <input type="number" id="timeout" name="timeout" min="1" max="30" placeholder="Enter time (1-30 mins)" required>

        <label>Close Background Apps:</label>
        <input type="checkbox" name="apps" value="WhatsApp"> WhatsApp<br>
        <input type="checkbox" name="apps" value="Facebook"> Facebook<br>
        <input type="checkbox" name="apps" value="Instagram"> Instagram<br>
        <input type="checkbox" name="apps" value="YouTube"> YouTube<br>
        <input type="checkbox" name="apps" value="Twitter"> Twitter<br>

        <button type="submit">Optimize Battery</button>
    </form>
</body>
</html>
